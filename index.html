<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="个人基金盘中估值监控">
<meta name="theme-color" content="#f6f8fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="蜉蝣基金">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap">
<link rel="stylesheet" href="css/style.css">
<title>蜉蝣基金</title>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">蜉蝣基金 <em id="mkt-status"></em></div>
    <button class="refresh-btn" id="ref-btn" onclick="refresh()">↻ 刷新</button>
  </div>
</div>

<div class="summary">
  <div class="sum-item"><div class="sum-label">今日估算</div><div class="sum-val" id="s-today">--</div></div>
  <div class="sum-item"><div class="sum-label">持仓市值</div><div class="sum-val" id="s-total">--</div></div>
  <div class="sum-item"><div class="sum-label">累计盈亏</div><div class="sum-val" id="s-profit">--</div></div>
</div>

<div class="page active" id="page-market">
  <div class="fund-list" id="fund-list">
    <div class="fund-card" style="pointer-events:none">
      <div class="skeleton" style="width:55%;height:15px"></div>
      <div class="skeleton" style="width:25%;height:11px"></div>
    </div>
    <div class="fund-card" style="pointer-events:none">
      <div class="skeleton" style="width:62%;height:15px"></div>
      <div class="skeleton" style="width:30%;height:11px"></div>
    </div>
    <div class="fund-card" style="pointer-events:none">
      <div class="skeleton" style="width:48%;height:15px"></div>
      <div class="skeleton" style="width:28%;height:11px"></div>
    </div>
  </div>
  <div class="last-upd" id="last-upd"></div>
</div>

<div class="page" id="page-edit">
  <div class="edit-page">
    <div class="sec-title">当前持仓</div>
    <div id="holdings-list"></div>

    <div class="sec-title">添加基金</div>
    <div class="add-form">
      <div class="f-row">
        <div class="f-label">基金代码（6位）</div>
        <input class="f-input" id="i-code" placeholder="例：110020" maxlength="6" inputmode="numeric">
      </div>
      <div class="f-row">
        <div class="f-label">基金名称（可留空，自动获取）</div>
        <input class="f-input" id="i-name" placeholder="留空则自动获取">
      </div>
      <div class="f-grid">
        <div class="f-row">
          <div class="f-label">持有份额</div>
          <input class="f-input" id="i-shares" placeholder="0" inputmode="decimal">
        </div>
        <div class="f-row">
          <div class="f-label">成本净值</div>
          <input class="f-input" id="i-cost" placeholder="0.000" inputmode="decimal">
        </div>
      </div>
      <button class="add-btn" onclick="addFund()">+ 添加</button>
    </div>

    <div class="export-row">
      <button class="exp-btn" onclick="exportData()">↓ 导出持仓</button>
      <button class="exp-btn" onclick="document.getElementById('imp-file').click()">↑ 导入持仓</button>
      <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-market" onclick="switchPage('market')">
    <span class="nav-icon">📈</span>行情
  </button>
  <button class="nav-btn" id="nav-edit" onclick="switchPage('edit')">
    <span class="nav-icon">⚙️</span>持仓
  </button>
  <button class="nav-btn" id="nav-status" onclick="switchPage('status')">
    <span class="nav-icon">🔄</span>状态
  </button>
</div>

<div class="page" id="page-status">
  <div class="status-page">
    <div class="sec-title">部署状态</div>
    <div class="status-card">
      <div class="status-item">
        <div class="status-label">最后更新</div>
        <div class="status-val" id="status-time">--</div>
      </div>
      <div class="status-item">
        <div class="status-label">提交信息</div>
        <div class="status-val" id="status-commit">--</div>
      </div>
      <div class="status-item">
        <div class="status-label">提交哈希</div>
        <div class="status-val status-hash" id="status-hash">--</div>
      </div>
    </div>
    
    <div style="margin-top: 20px;">
      <a href="https://github.com/AureliusWu/FundVal/actions" target="_blank" class="status-link">
        🔗 查看 GitHub Actions 构建状态
      </a>
    </div>
    <div style="margin-top: 12px;">
      <a href="https://github.com/AureliusWu/FundVal" target="_blank" class="status-link">
        🔗 查看仓库代码
      </a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js" defer></script>
</body>
</html>
