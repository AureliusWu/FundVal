<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="蜉蝣基金">
<link rel="manifest" href="manifest.json">
<title>蜉蝣基金</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --bg2: #141414;
  --bg3: #1c1c1c;
  --line: #2a2a2a;
  --text: #e8e8e8;
  --muted: #555;
  --up: #00c076;
  --down: #ff4d4d;
  --flat: #666;
  --accent: #c8a96e;
  --sans: 'Noto Sans SC', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;overscroll-behavior:none}

.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--line);padding:env(safe-area-inset-top) 16px 0}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{font-weight:500;font-size:15px;color:var(--accent);letter-spacing:2px}
.logo em{color:var(--muted);font-style:normal;font-size:10px;margin-left:6px;font-variant-numeric:tabular-nums}
.refresh-btn{background:none;border:1px solid var(--line);color:var(--muted);padding:6px 12px;border-radius:4px;font-size:11px;cursor:pointer;transition:all .2s;font-family:var(--sans)}
.refresh-btn:active{background:var(--bg3);color:var(--text)}
.refresh-btn.loading{color:var(--accent);border-color:var(--accent)}

.summary{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--line)}
.sum-item{padding:14px 12px;text-align:center;border-right:1px solid var(--line)}
.sum-item:last-child{border-right:none}
.sum-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.sum-val{font-size:14px;font-weight:500;font-variant-numeric:tabular-nums}
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--flat)}

.page{display:none}.page.active{display:block}

.fund-list{padding-bottom:72px}
.fund-card{padding:16px;border-bottom:1px solid var(--line);position:relative;overflow:hidden;transition:background .15s}
.fund-card:active{background:var(--bg2)}
.fund-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--line);transition:background .3s}
.fund-card.up::before{background:var(--up)}
.fund-card.down::before{background:var(--down)}
.fund-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.fund-name{font-size:14px;font-weight:500;line-height:1.35;max-width:210px}
.fund-code{font-size:10px;color:var(--muted);margin-top:3px;font-variant-numeric:tabular-nums}
.fund-pct{font-size:20px;font-weight:500;font-variant-numeric:tabular-nums;text-align:right;line-height:1}
.fund-pct-time{font-size:10px;color:var(--muted);text-align:right;margin-top:4px}
.fund-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:2px}
.stat-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.stat-val{font-size:12px;font-variant-numeric:tabular-nums}
.fund-error{font-size:12px;color:var(--muted);font-style:italic;margin-top:4px}

.last-upd{text-align:center;padding:12px;font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}

.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:3px;height:13px;margin-bottom:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.edit-page{padding:16px 16px 80px}
.sec-title{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:20px 0 10px}
.sec-title:first-child{margin-top:0}
.holding-item{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.h-name{font-size:13px;font-weight:500;margin-bottom:2px}
.h-detail{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.del-btn{background:none;border:1px solid #3a2020;color:var(--down);width:28px;height:28px;border-radius:4px;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1}

.add-form{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:14px}
.f-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.f-row{margin-bottom:12px}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f-input{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px;outline:none;transition:border-color .2s;font-family:var(--sans);font-variant-numeric:tabular-nums}
.f-input:focus{border-color:var(--accent)}
.f-input::placeholder{color:var(--muted)}
.add-btn{width:100%;background:var(--accent);color:#0d0d0d;border:none;padding:10px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;margin-top:2px;font-family:var(--sans);letter-spacing:1px}
.add-btn:active{opacity:.8}

.export-row{display:flex;gap:8px;margin-top:16px}
.exp-btn{flex:1;background:none;border:1px solid var(--line);color:var(--muted);padding:8px;border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .2s}
.exp-btn:active{background:var(--bg3);color:var(--text)}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100}
.nav-btn{flex:1;background:none;border:none;color:var(--muted);padding:10px 0;font-size:10px;font-family:var(--sans);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;letter-spacing:.5px}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:17px;line-height:1}

.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--line);color:var(--text);padding:7px 16px;border-radius:20px;font-size:12px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty-hint{padding:48px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">蜉蝣基金 <em id="mkt-status"></em></div>
    <button class="refresh-btn" id="ref-btn" onclick="refresh()">↻ 刷新</button>
  </div>
</div>

<div class="summary">
  <div class="sum-item"><div class="sum-label">今日估算</div><div class="sum-val" id="s-today">--</div></div>
  <div class="sum-item"><div class="sum-label">持仓市值</div><div class="sum-val" id="s-total">--</div></div>
  <div class="sum-item"><div class="sum-label">累计盈亏</div><div class="sum-val" id="s-profit">--</div></div>
</div>

<div class="page active" id="page-market">
  <div class="fund-list" id="fund-list">
    <div class="fund-card" style="pointer-events:none">
      <div class="skeleton" style="width:55%;height:15px"></div>
      <div class="skeleton" style="width:25%;height:11px"></div>
    </div>
    <div class="fund-card" style="pointer-events:none">
      <div class="skeleton" style="width:62%;height:15px"></div>
      <div class="skeleton" style="width:30%;height:11px"></div>
    </div>
    <div class="fund-card" style="pointer-events:none">
      <div class="skeleton" style="width:48%;height:15px"></div>
      <div class="skeleton" style="width:28%;height:11px"></div>
    </div>
  </div>
  <div class="last-upd" id="last-upd"></div>
</div>

<div class="page" id="page-edit">
  <div class="edit-page">
    <div class="sec-title">当前持仓</div>
    <div id="holdings-list"></div>

    <div class="sec-title">添加基金</div>
    <div class="add-form">
      <div class="f-row">
        <div class="f-label">基金代码（6位）</div>
        <input class="f-input" id="i-code" placeholder="例：110020" maxlength="6" inputmode="numeric">
      </div>
      <div class="f-row">
        <div class="f-label">基金名称（可留空，自动获取）</div>
        <input class="f-input" id="i-name" placeholder="留空则自动获取">
      </div>
      <div class="f-grid">
        <div class="f-row">
          <div class="f-label">持有份额</div>
          <input class="f-input" id="i-shares" placeholder="0" inputmode="decimal">
        </div>
        <div class="f-row">
          <div class="f-label">成本净值</div>
          <input class="f-input" id="i-cost" placeholder="0.000" inputmode="decimal">
        </div>
      </div>
      <button class="add-btn" onclick="addFund()">+ 添加</button>
    </div>

    <div class="export-row">
      <button class="exp-btn" onclick="exportData()">↓ 导出持仓</button>
      <button class="exp-btn" onclick="document.getElementById('imp-file').click()">↑ 导入持仓</button>
      <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-market" onclick="switchPage('market')">
    <span class="nav-icon">📈</span>行情
  </button>
  <button class="nav-btn" id="nav-edit" onclick="switchPage('edit')">
    <span class="nav-icon">⚙️</span>持仓
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'fuyu_holdings_v1';
let holdings = [];
let fundsData = [];

// ── 持仓存取 ─────────────────────────────────────────────
function loadHoldings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    holdings = raw ? JSON.parse(raw) : [
      {code:'110020', name:'易方达沪深300ETF联接A', shares:1000, cost:1.50},
      {code:'270042', name:'广发纳斯达克100ETF联接A', shares:500, cost:2.80},
    ];
  } catch(e) { holdings = []; }
}

function saveHoldings() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(holdings));
}

// ── 导出 / 导入 ───────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(holdings, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fuyu-holdings.json';
  a.click();
  showToast('已导出持仓文件');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      holdings = data;
      saveHoldings();
      renderHoldingsList();
      showToast('导入成功，共 ' + holdings.length + ' 条');
      refresh();
    } catch(err) { showToast('文件格式错误'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── 获取单只基金盘中估值 ──────────────────────────────────
// 通过 JSONP 调用东方财富接口，无需后端，直接浏览器可调
function fetchFund(code) {
  return new Promise((resolve) => {
    const cbName = '_fuyu_' + code + '_' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cbName];
      script.remove();
      resolve({code, status:'error', message:'请求超时'});
    }, 8000);

    window[cbName] = function(data) {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      try {
        resolve({
          code: data.fundcode || code,
          name: data.name || code,
          last_nav: parseFloat(data.dwjz) || 0,
          est_nav: parseFloat(data.gsz) || 0,
          est_change: parseFloat(data.gszzl) || 0,
          nav_date: data.jzrq || '',
          est_time: data.gztime || '',
          status: 'ok'
        });
      } catch(e) {
        resolve({code, status:'error', message:'数据解析失败'});
      }
    };

    // 东方财富公开 JSONP 接口
    script.src = `https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}&callback=${cbName}`;
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      resolve({code, status:'error', message:'接口请求失败'});
    };
    document.head.appendChild(script);
  });
}

// ── 刷新所有持仓数据 ─────────────────────────────────────
async function refresh() {
  const btn = document.getElementById('ref-btn');
  btn.classList.add('loading');
  btn.textContent = '↻ 获取中';

  if (holdings.length === 0) {
    renderFundList([]);
    btn.classList.remove('loading');
    btn.textContent = '↻ 刷新';
    return;
  }

  const results = await Promise.all(holdings.map(h => fetchFund(h.code)));

  // 合并持仓信息
  fundsData = results.map((r, i) => {
    const h = holdings[i];
    const d = {...r, shares: h.shares || 0, cost: h.cost || 0};
    if (r.status === 'ok' && r.name === r.code && h.name) d.name = h.name;
    if (d.status === 'ok' && d.shares > 0) {
      const curr = d.est_nav * d.shares;
      const costVal = d.cost * d.shares;
      d.today_profit = (d.est_nav - d.last_nav) * d.shares;
      d.total_profit = curr - costVal;
      d.total_profit_rate = costVal > 0 ? (curr - costVal) / costVal * 100 : 0;
      d.curr_value = curr;
    }
    return d;
  });

  renderFundList(fundsData);
  const now = new Date();
  document.getElementById('last-upd').textContent =
    `估算时间 ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  btn.classList.remove('loading');
  btn.textContent = '↻ 刷新';
}

function pad(n) { return String(n).padStart(2,'0'); }

// ── 渲染基金列表 ─────────────────────────────────────────
function renderFundList(data) {
  const list = document.getElementById('fund-list');
  if (!data || data.length === 0) {
    list.innerHTML = '<div class="empty-hint">暂无持仓<br>在「持仓」页添加基金代码</div>';
    ['s-today','s-total','s-profit'].forEach(id => {
      document.getElementById(id).textContent = '--';
      document.getElementById(id).className = 'sum-val';
    });
    return;
  }

  let todaySum = 0, totalVal = 0, profitSum = 0;
  let html = '';

  data.forEach(f => {
    if (f.status !== 'ok') {
      html += `<div class="fund-card">
        <div class="fund-top">
          <div><div class="fund-name">${esc(f.name||f.code)}</div><div class="fund-code">${f.code}</div></div>
        </div>
        <div class="fund-error">获取失败 · ${esc(f.message||'')}</div>
      </div>`;
      return;
    }
    const cc = f.est_change > 0 ? 'up' : f.est_change < 0 ? 'down' : 'flat';
    const sign = f.est_change >= 0 ? '+' : '';
    todaySum += f.today_profit || 0;
    totalVal += f.curr_value || 0;
    profitSum += f.total_profit || 0;

    html += `<div class="fund-card ${cc}">
      <div class="fund-top">
        <div>
          <div class="fund-name">${esc(f.name)}</div>
          <div class="fund-code">${f.code} · ${f.nav_date}</div>
        </div>
        <div>
          <div class="fund-pct ${cc}">${sign}${fmt(f.est_change)}%</div>
          <div class="fund-pct-time">${f.est_time||'--'}</div>
        </div>
      </div>
      <div class="fund-stats">
        <div><div class="stat-label">盘中估值</div><div class="stat-val">${fmt4(f.est_nav)}</div></div>
        <div><div class="stat-label">上一净值</div><div class="stat-val">${fmt4(f.last_nav)}</div></div>
        <div><div class="stat-label">今日估算</div><div class="stat-val ${f.today_profit>=0?'up':'down'}">${f.shares>0?fmtM(f.today_profit):'--'}</div></div>
        ${f.shares > 0 ? `
        <div><div class="stat-label">持有份额</div><div class="stat-val">${fmt2(f.shares)}</div></div>
        <div><div class="stat-label">持仓市值</div><div class="stat-val">${fmt2(f.curr_value)}</div></div>
        <div><div class="stat-label">累计盈亏</div><div class="stat-val ${f.total_profit>=0?'up':'down'}">${fmtM(f.total_profit)}</div></div>
        ` : ''}
      </div>
    </div>`;
  });

  list.innerHTML = html;

  setSumVal('s-today', todaySum);
  document.getElementById('s-total').textContent = fmtM2(totalVal);
  document.getElementById('s-total').className = 'sum-val';
  setSumVal('s-profit', profitSum);
}

function setSumVal(id, val) {
  const el = document.getElementById(id);
  el.textContent = fmtM(val);
  el.className = 'sum-val ' + (val > 0 ? 'up' : val < 0 ? 'down' : 'flat');
}

function fmt(n)  { return isNaN(n) ? '--' : Number(n).toFixed(2); }
function fmt2(n) { return isNaN(n) ? '--' : Number(n).toFixed(2); }
function fmt4(n) { return isNaN(n) ? '--' : Number(n).toFixed(4); }
function fmtM(n) {
  if (isNaN(n)) return '--';
  const s = n >= 0 ? '+' : '';
  const a = Math.abs(n);
  return s + (a >= 10000 ? (n/10000).toFixed(2)+'万' : n.toFixed(2));
}
function fmtM2(n) {
  if (isNaN(n)) return '--';
  return n >= 10000 ? (n/10000).toFixed(2)+'万' : n.toFixed(2);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 持仓编辑 ─────────────────────────────────────────────
function renderHoldingsList() {
  const list = document.getElementById('holdings-list');
  if (!holdings.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:4px 0">暂无持仓</div>';
    return;
  }
  list.innerHTML = holdings.map((h,i) => `
    <div class="holding-item">
      <div>
        <div class="h-name">${esc(h.name||h.code)}</div>
        <div class="h-detail">${h.code} · ${h.shares}份 · 成本${h.cost}</div>
      </div>
      <button class="del-btn" onclick="delFund(${i})">×</button>
    </div>`).join('');
}

function addFund() {
  const code = document.getElementById('i-code').value.trim();
  const name = document.getElementById('i-name').value.trim();
  const shares = parseFloat(document.getElementById('i-shares').value) || 0;
  const cost = parseFloat(document.getElementById('i-cost').value) || 0;
  if (!code || !/^\d{6}$/.test(code)) { showToast('请输入6位数字基金代码'); return; }
  if (holdings.find(h => h.code === code)) { showToast('该基金已在列表中'); return; }
  holdings.push({code, name: name||code, shares, cost});
  saveHoldings();
  renderHoldingsList();
  document.getElementById('i-code').value='';
  document.getElementById('i-name').value='';
  document.getElementById('i-shares').value='';
  document.getElementById('i-cost').value='';
  showToast('已添加' + (name||code));
  refresh();
}

function delFund(i) {
  const h = holdings[i];
  if (!confirm(`删除「${h.name||h.code}」？`)) return;
  holdings.splice(i,1);
  saveHoldings();
  renderHoldingsList();
  refresh();
}

// ── 页面切换 ─────────────────────────────────────────────
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name==='edit') renderHoldingsList();
}

// ── 市场状态 ─────────────────────────────────────────────
function updateMktStatus() {
  const now = new Date();
  const d = now.getDay();
  const t = now.getHours()*60 + now.getMinutes();
  let s = '';
  if (d===0||d===6) s='休市';
  else if (t>=570&&t<690) s='上午盘';
  else if (t>=780&&t<900) s='下午盘';
  else if (t>=900) s='已收盘';
  else s='盘前';
  document.getElementById('mkt-status').textContent = s;
}

// ── 自动刷新 ─────────────────────────────────────────────
function startAutoRefresh() {
  setInterval(() => {
    const now = new Date();
    const d = now.getDay(), t = now.getHours()*60+now.getMinutes();
    const trading = d>=1&&d<=5&&((t>=565&&t<695)||(t>=775&&t<905));
    if (trading) refresh();
  }, 60000);
}

// ── Toast ────────────────────────────────────────────────
function showToast(msg, ms=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// ── Service Worker ───────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── 初始化 ───────────────────────────────────────────────
loadHoldings();
updateMktStatus();
setInterval(updateMktStatus, 30000);
refresh();
startAutoRefresh();
</script>
</body>
</html>
