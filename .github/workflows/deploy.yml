name: Build and Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: fundval-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
    - name: Install locked dependencies
      run: npm ci
    - name: Test and syntax check
      run: |
        npm test
        npm run check
    - name: Build static Pages artifact
      shell: bash
      run: |
        mkdir site
        cp -R index.html manifest.json sw.js icon-192.png icon-512.png css js data site/
        test -f site/index.html
        test -f site/js/version.js
        test -f site/sw.js
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
